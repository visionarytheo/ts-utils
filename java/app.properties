# ===================================================================
# CONFIGURATION IMPORTS
# ===================================================================
spring.config.import=optional:file:.env.properties

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8080
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===================================================================
# APPLICATION CONFIGURATION
# ===================================================================
spring.application.name=tserver

# ===================================================================
# DATABASE CONNECTION (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# HIKARI CONNECTION POOL OPTIMISATION
# ===================================================================
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.leak-detection-threshold=2000

# ===================================================================
# DATABASE MIGRATIONS (Flyway)
# ===================================================================
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

# ===================================================================
# SECURITY CONFIGURATION (OAuth2 / Google JWT)
# ===================================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com

# ===================================================================
# LOGGING CONFIGURATION
# ===================================================================
# 1. Base log level for the entire application (Keep quiet in production)
logging.level.root=INFO

# 2. Flyway migration lifecycle tracking
logging.level.org.flywaydb=INFO

# 3. Spring Security (Helps troubleshoot failed JWT validations)
logging.level.org.springframework.security=INFO

# 4. Database Query Logging (Uncomment ONLY for local debugging; too loud for prod)
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.results=TRACE

# 5. Log File Management (Rotates logs automatically so disk space never runs out)
logging.file.name=logs/${spring.application.name}.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
